test_name: インデックス編集 アイテムインポート

includes:
  - !include ../config.yaml

marks:
  - tree_editing_edit_index_item_import
  - system_admin
  - repository_admin
  - community_admin
  - contributor
  - user
  - guest

stages:
  - name: GET login system admin
    request:
      url: "{host}/accounts/login/"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.response_helper:response_save_csrf_token
  - name: POST login system admin
    request:
      url: "{host}/accounts/login/"
      method: POST
      json:
        email: wekosoftware@nii.ac.jp
        password: uspass123
        next: "/"
        csrf_token: "{csrf_token}"
      verify: false
    response:
      status_code: 302
  - name: prepare index
    request:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.index.response_helper:set_target_id
          extra_kwargs:
            file_path: "request_params/index/test_data/sysadmin/index_data_3.json"
            invalid: true
  - name: prepare import item
    requeest:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.common.item_import_helper:import_item
          extra_kwargs:
            host: "{host}"
            file_path: "./upload_file/prepare/デフォルトアイテムタイプ（フル）(30002).tsv"
            target_index: 1623632832836
  - name: edit index system admin
    request:
      url: "{host}/api/tree/index/{target_id_list[0]}"
      method: PUT
      verify: false
      json:
        $ext:
          function: helper.index.request_helper:generate_request_body
          extra_kwargs:
            file_path: "request_params/index/test_data/sysadmin/index_data_3.json"
    response:
      status_code: 200
      verify_response_with:
        function: helper.index.verify_helper:verify_edit_during_import
        extra_kwargs:
          index: "{index}"
  - name: logout system admin
    request:
      url: "{host}/logout/"
      method: GET
      verify: false
    response:
      status_code: 302
      headers:
        Location: "{host}/"
  - name: GET login repository admin
