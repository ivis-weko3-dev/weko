# Start System Administrator's Test
test_name: システム管理者 ツリー編集画面表示 mAP有効 英語

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_sysadmin
  - tree_editing_display_map_enabled_en
  - system_admin

stages:
  - name: prepare_pdfcoverpage
    request:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.index.response_helper:set_pdfcoverpage
          extra_kwargs:
            avail: "enable"
            lang: en
            map: register
  - name: admin/indexedit
    request:
      url: "{host}/admin/indexedit/"
      method: GET
      verify: false
    response:
      status_code: 200
      verify_response_with:
        function: helper.index.verify_helper:verify_indexedit_elements
        extra_kwargs:
          lang: en
          coverpage: true
          map_groups: {"add": ["jc_roles_weko3_example_org_groups_add1,jc_weko3_example_org_groups_add2,jc_weko3_example_org_groups_add3"]}

