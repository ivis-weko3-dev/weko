---
test_name: システム管理者 インデックス新規作成 mAP有効

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_sysadmin
  - tree_editing_create_index_map_enabled
  - system_admin

stages:
  - name: api/tree/index (create)
    request:
      url: "{host}/api/tree/index/0"
      method: POST
      verify: false
      json:
        id: 1000
        value: "Test New Index"
    response:
      status_code: 201
      verify_response_with:
        function: helper.index.verify_helper:verify_created_index
        extra_kwargs:
          id: 1000
          name: "Test New Index"
          user_id: 1
          map: true
  - name: api/tree?action=browsing
    request:
      url: "{host}/api/tree"
      method: GET
      params:
        action: browsing
      verify: false
    response:
      status_code: 200
      verify_response_with:
        function: helper.index.verify_helper:verify_index_tree
        extra_kwargs:
          expected_tree_file: "response_data/index/index_tree_part.json"
          role_id: 1
          edited_id_list: [1000]

