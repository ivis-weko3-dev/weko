        extra_kwargs:
          expected_tree_file: "response_data/index/index_tree_part.json"
          role_id: 1
          edited_id_list: [1000]

---
test_name: システム管理者 サムネイル設定 保存エラー

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_sysadmin
  - tree_editing_thumbnail_save_error
  - system_admin

stages:
  - name: admin/indexedit/upload
    request:
      url: "{host}/admin/indexedit/upload"
      method: POST
      verify: false
      files:
        uploadFile: "./upload_file/thumbnail.png"
    response:
      status_code: 500
      verify_response_with:
        function: helper.index.verify_helper:verify_internal_server_error_html

---
test_name: システム管理者 インデックス削除 サーバ内部エラー

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_sysadmin
  - tree_editing_delete_index_internal_server_error
  - system_admin

stages:
  - name: prepare_index
    request:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.index.response_helper:get_indices
  - name: delete index
    request:
      url: "{host}/api/tree/index/3"
      method: DELETE
      params:
        action: all
      verify: false
    response:
      status_code: 500
      verify_response_with:
        function: helper.index.verify_helper.verify_internal_server_error
        extra_kwargs:
          index: "{index_list}"

# End System Administrator's Test
