# Start System Administrator's Test
test_name: システム管理者 ツリー編集画面表示 mAP有効 サーバ内部エラー

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_sysadmin
  - tree_editing_display_map_enabled_internal_server_error
  - system_admin

stages:
  - name: admin/indexedit
    request:
      url: "{host}/admin/indexedit/"
      method: GET
      verify: false
    response:
      status_code: 500
      verify_response_with:
        function: helper.index.verify_helper:verify_internal_server_error_html

