test_name: コントリビュータ ツリー編集画面表示 mAP無効 英語

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_contributor
  - tree_editing_display_map_disabled_en
  - contributor

stages:
  - name: prepare_pdfcoverpage
    request:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.index.response_helper:set_pdfcoverpage
          extra_kwargs:
            avail: "disable"
            lang: en
  - name: admin/indexedit
    request:
      url: "{host}/admin/indexedit/"
      method: GET
      verify: false
    response:
      status_code: 403
      verify_response_with:
        function: helper.index.verify_helper:verify_forbidden_html

