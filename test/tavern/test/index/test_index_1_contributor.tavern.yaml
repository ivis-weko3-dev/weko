includes:
  - !include ../config.yaml

marks:
  - tree_editing_delete_index_within_community
  - contributor

stages:
  - name: GET login repository admin
    request:
      url: "{host}/accounts/login/"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.response_helper:response_save_csrf_token
  - name: POST login repository admin
    request:
      url: "{host}/accounts/login/"
      method: POST
      json:
        email: repoadmin@example.org
        password: uspass123
        next: "/"
        csrf_token: "{csrf_token}"
      verify: false
    response:
      status_code: 302
  - name: prepare_item_in_index
    request:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.common.item_create_helper:create_item
          extra_kwargs:
            host: "{host}"
            create_info_file: "request_params/prepare_item/create_item_info.json"
            creation_count: 1
            target_index: 3
            file_path: "./upload_file/test.txt"
