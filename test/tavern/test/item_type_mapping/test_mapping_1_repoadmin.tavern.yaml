test_name: リポジトリ管理者 アイテムタイプ登録なし

includes:
  - !include ../config.yaml

marks:
  - usefixtures:
    - login_repoadmin
  - no_itemtypes
  - repository_admin

stages:
  - name: delete_itemtypes
    request:
      url: "{host}"
      method: GET
      verify: false
    response:
      status_code: 200
      save:
        $ext:
          function: helper.item_type_mapping.response_helper:delete_itemtypes
  - name: admin/itemtypes/mapping/
    request:
      url: "{host}/admin/itemtypes/mapping/"
      method: GET
      verify: false
    response:
      status_code: 200
      verify_response_with:
        function: helper.item_type_mapping.verify_helper:verify_contains
        extra_kwargs:
          expected_substring: "No itemtypes"

