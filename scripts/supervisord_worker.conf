;[unix_http_server]
;file=/var/run/supervisor.sock   ; (the path to the socket file)
;chmod=0700                       ; sockef file mode (default 0700)

[inet_http_server]
port = 127.0.0.1:9001
username = dummy
password = dummy

[supervisord]
nodaemon=true
logfile = /tmp/supervisor-daemon.log
pidfile = /tmp/supervisor.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=http://127.0.0.1:9001
username = dummy
password = dummy

[program:celery]
command=celery -A invenio_app.celery worker --loglevel=DEBUG
;command=celery -A invenio_app.celery worker --loglevel=ERROR -B
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:celery-beat]
; command=celery -A invenio_app.celery beat --loglevel=ERROR -s /tmp/celerybeat-schedule  --pidfile="/tmp/celerybeat.pid"
command=celery -A invenio_app.celery beat --loglevel=DEBUG -s /tmp/celerybeat-schedule  --pidfile="/tmp/celerybeat.pid"
numprocs=1
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
;startsecs=10
